services:
  db:
    image: postgres:16-alpine
    container_name: taxi_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-taxi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taxi_secret}
      POSTGRES_DB: ${POSTGRES_DB:-taxi_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taxi} -d ${POSTGRES_DB:-taxi_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: taxi_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-alpine
    container_name: taxi_frontend
    working_dir: /app
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      API_PROXY_TARGET: http://api:8000
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  postgres_data:
  frontend_node_modules:
